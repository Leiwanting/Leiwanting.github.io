<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encode/Decode Tool</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .container { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 150px; padding: 10px; box-sizing: border-box; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; background: #007bff; color: white; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; background: #e9ecef; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Base64 编码/解码工具</h1>
        
        <textarea id="inputText" placeholder="请输入需要编码/解码的内容..."></textarea>
        
        <button onclick="encodeBase64()">编码 (Encode)</button>
        <button onclick="decodeBase64()">解码 (Decode)</button>
        <button onclick="clearText()">清空</button>
        
        <div class="result">
            <h3>结果：</h3>
            <p id="outputResult"></p>
        </div>
    </div>

    <script>
        // Base64 编码
        function encodeBase64() {
            const input = document.getElementById('inputText').value;
            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('outputResult').textContent = encoded;
            } catch (e) {
                document.getElementById('outputResult').textContent = '编码失败：' + e.message;
            }
        }

        // Base64 解码
        function decodeBase64() {
            const input = document.getElementById('inputText').value;
            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                document.getElementById('outputResult').textContent = decoded;
            } catch (e) {
                document.getElementById('outputResult').textContent = '解码失败，请检查输入是否为有效的 Base64 字符串';
            }
        }

        // 清空内容
        function clearText() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputResult').textContent = '';
        }
    </script>
</body>
</html>
